name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        run: |
          rsync -avz --delete --exclude '/uploads/*' --exclude '/sitemap.xml' \
            frontend/dist/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/aitoolhub/spa/

      - name: Deploy backend
        run: |
          rsync -avz backend/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/ubuntu/aitoolhub-admin/ \
            --exclude '__pycache__' --exclude '*.bak*' --exclude 'data/' --exclude 'static/uploads' --exclude 'static/icon-cache/'

      - name: Install Python dependencies
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /home/ubuntu/aitoolhub-admin && sudo pip install -r requirements.txt"

      - name: Ensure API_KEY in systemd env
        env:
          FIXED_KEY: ${{ secrets.JUST4TECH_API_KEY }}
        run: |
          # Step 1: write the key file via stdin pipe
          echo "${FIXED_KEY}" | ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            set -e
            API_KEY_FILE=/etc/aitoolhub/api_key
            sudo mkdir -p /etc/aitoolhub
            read -r NEW_KEY
            if [ -n "$NEW_KEY" ]; then
              echo "$NEW_KEY" | sudo tee "$API_KEY_FILE" > /dev/null
              sudo chmod 644 "$API_KEY_FILE"
              echo "Using API_KEY from GitHub secrets"
            elif [ ! -f "$API_KEY_FILE" ]; then
              python3 -c "import secrets; print(secrets.token_hex(24))" | sudo tee "$API_KEY_FILE" > /dev/null
              sudo chmod 644 "$API_KEY_FILE"
              echo "Generated new random API_KEY"
            else
              echo "API_KEY unchanged"
            fi'

          # Step 2: ensure systemd env and override config
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            set -e
            API_KEY_FILE=/etc/aitoolhub/api_key
            sudo mkdir -p /etc/systemd/system/aitoolhub-admin.service.d
            printf "[Service]\nEnvironmentFile=/etc/aitoolhub/api_key_env\n" | sudo tee /etc/systemd/system/aitoolhub-admin.service.d/override.conf > /dev/null
            echo "API_KEY=$(sudo cat $API_KEY_FILE)" | sudo tee /etc/aitoolhub/api_key_env > /dev/null
            sudo chmod 644 /etc/aitoolhub/api_key_env
            sudo systemctl daemon-reload
            echo "systemd env configured"'

      - name: Restart backend
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo systemctl restart aitoolhub-admin && sleep 2 && \
             HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8083/api/posts); \
             if [ \"\$HTTP_CODE\" != \"200\" ]; then \
               echo 'Service failed to start. Checking logs...'; \
               sudo journalctl -u aitoolhub-admin --no-pager -n 20; \
               sudo systemctl status aitoolhub-admin --no-pager; \
               echo \"HTTP status: \$HTTP_CODE\"; \
               exit 1; \
             fi; \
             echo \"OK (HTTP \$HTTP_CODE)\""
